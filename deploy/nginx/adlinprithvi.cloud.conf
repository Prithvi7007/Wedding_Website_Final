limit_req_zone $binary_remote_addr zone=wedding_invite:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=wedding_rsvp:10m rate=10r/m;

map $arg_v $wedding_static_cache_control {
    default "public, max-age=31536000, immutable";
    "" "public, no-cache";
}

map $arg_v $wedding_static_expires {
    default 1y;
    "" -1;
}

upstream wedding_app {
    server unix:/run/wedding/wedding.sock fail_timeout=0;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name adlinprithvi.cloud www.adlinprithvi.cloud;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://adlinprithvi.cloud$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.adlinprithvi.cloud;

    ssl_certificate /etc/letsencrypt/live/adlinprithvi.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adlinprithvi.cloud/privkey.pem;

    return 301 https://adlinprithvi.cloud$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name adlinprithvi.cloud;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/adlinprithvi.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adlinprithvi.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location /static/ {
        alias /var/www/wedding/app/static/;
        access_log off;
        expires $wedding_static_expires;
        add_header Cache-Control $wedding_static_cache_control always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Invite tokens are credentials. Do not write them to access logs.
    location ^~ /invite/ {
        access_log off;
        limit_req zone=wedding_invite burst=10 nodelay;
        proxy_pass http://wedding_app;
        include /etc/nginx/proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Request-ID $request_id;
        proxy_redirect off;
    }

    location = /dashboard/rsvp {
        limit_req zone=wedding_rsvp burst=5 nodelay;
        proxy_pass http://wedding_app;
        include /etc/nginx/proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Request-ID $request_id;
        proxy_redirect off;
    }

    location = /healthz {
        access_log off;
        proxy_pass http://wedding_app;
        include /etc/nginx/proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location = /readyz {
        access_log off;
        proxy_pass http://wedding_app;
        include /etc/nginx/proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location / {
        proxy_pass http://wedding_app;
        proxy_http_version 1.1;
        include /etc/nginx/proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Request-ID $request_id;
        proxy_redirect off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
