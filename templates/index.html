<!DOCTYPE html>
<html>
<head>
    <title>Adlin & Prithvi | Private Invitation</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=20260707g">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="login-page">

    <div class="login-container">


        <div class="login-private-line">
            Private Invitation
        </div>

        <h1 class="login-title">Adlin & Prithvi</h1>

        <div class="login-divider"></div>

        <p class="subtitle login-subtitle">
            Sign in to view wedding details, RSVP, travel information, and event updates.
        </p>

        <form action="/login" method="POST" class="login-form" id="login-form">
            <div class="form-group">
                <label>Invitation Email</label>
                <input 
                    type="email" 
                    name="email" 
                    placeholder="Enter your invitation email" 
                    required
                >
            </div>

            <div class="form-group">
                <label>Access Code</label>
                <input 
                    type="password" 
                    name="password" 
                    placeholder="Enter your access code" 
                    required
                >
            </div>

            <button type="submit" class="open-invitation-btn" id="login-submit-btn">
                <span class="btn-label">Open Invitation</span>
                <span class="btn-spinner" aria-hidden="true"></span>
            </button>
            <p class="login-error-message" id="login-error-message"></p>

        </form>

        <p class="small-text">
            Your invitation awaits.
        </p>

    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("login-form");
            const button = document.getElementById("login-submit-btn");
            const errorMessage = document.getElementById("login-error-message");

            const dashboardImages = [
                "/static/images/site-bg.webp",

                "/static/images/DSC06660.webp",
                "/static/images/DSC06692.webp",
                "/static/images/DSC06717.webp",
                "/static/images/DSC06785.webp",
                "/static/images/DSC06855.webp",
                "/static/images/DSC06882.webp",

                "/static/images/HALDI.webp",
                "/static/images/WEDDING.webp",
                "/static/images/RECEPTION.webp",

                "/static/images/HALDI-mobile.webp",
                "/static/images/WEDDING-mobile.webp",
                "/static/images/RECEPTION-mobile.webp",

                "/static/images/schedule/attire-haldi.webp",
                "/static/images/schedule/attire-hindu.webp",
                "/static/images/schedule/attire-reception.webp",

                "/static/images/travel/airport.webp",
                "/static/images/travel/hotel.webp",
                "/static/images/travel/tampa.webp",
                "/static/images/travel/restaurants.webp"
            ];

            function preloadImage(src) {
                return new Promise(function (resolve) {
                    const img = new Image();

                    img.onload = function () {
                        resolve();
                    };

                    img.onerror = function () {
                        resolve();
                    };

                    img.src = src;
                });
            }

            function preloadDashboardImages() {
                const preloadPromises = dashboardImages.map(preloadImage);
                return Promise.all(preloadPromises);
            }

            function setLoading(isLoading) {
                if (!button) {
                    return;
                }

                if (isLoading) {
                    button.classList.add("is-loading");
                    button.disabled = true;
                } else {
                    button.classList.remove("is-loading");
                    button.disabled = false;
                }
            }

            form.addEventListener("submit", async function (event) {
                event.preventDefault();

                if (errorMessage) {
                    errorMessage.textContent = "";
                }

                setLoading(true);

                try {
                    const response = await fetch(form.action, {
                        method: "POST",
                        body: new FormData(form),
                        headers: {
                            "X-Requested-With": "XMLHttpRequest",
                            "Accept": "application/json"
                        }
                    });

                    const data = await response.json();

                    if (!response.ok || !data.success) {
                        throw new Error(data.message || "Login failed.");
                    }

                    await preloadDashboardImages();

                    window.location.href = data.redirect_url;
                } catch (error) {
                    setLoading(false);

                    if (errorMessage) {
                        errorMessage.textContent = error.message || "Something went wrong. Please try again.";
                    }
                }
            });
        });
    </script>

</body>
</html>
