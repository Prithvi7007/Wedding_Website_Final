<!DOCTYPE html>
<html>
<head>
    <title>Adlin & Prithvi | Private Invitation</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=20260705b">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="login-page">

    <div class="login-container">


        <div class="login-private-line">
            Private Invitation
        </div>

        <h1 class="login-title">Adlin & Prithvi</h1>

        <div class="login-divider"></div>

        <p class="subtitle login-subtitle">
            Sign in to view wedding details, RSVP, travel information, and event updates.
        </p>

        <form action="/login" method="POST" class="login-form">
            <div class="form-group">
                <label>Invitation Email</label>
                <input 
                    type="email" 
                    name="email" 
                    placeholder="Enter your invitation email" 
                    required
                >
            </div>

            <div class="form-group">
                <label>Access Code</label>
                <input 
                    type="password" 
                    name="password" 
                    placeholder="Enter your access code" 
                    required
                >
            </div>

            <button type="submit" class="open-invitation-btn">
                Open Invitation
            </button>
        </form>

        <p class="small-text">
            Your invitation awaits.
        </p>

    </div>

</body>
</html>
