<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#171411">
    <title>{{ status_code }} | Adlin &amp; Prithvi</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(183, 127, 45, .22), transparent 45%),
                #171411;
            color: #f7ead2;
            font-family: Georgia, "Times New Roman", serif;
        }
        main {
            width: min(620px, 100%);
            padding: clamp(32px, 7vw, 64px);
            text-align: center;
            border: 1px solid rgba(232, 194, 128, .35);
            border-radius: 28px;
            background: rgba(28, 22, 18, .78);
            box-shadow: 0 24px 80px rgba(0, 0, 0, .38);
        }
        .code {
            margin: 0 0 10px;
            color: #e7bd68;
            font: 700 12px/1.2 Arial, sans-serif;
            letter-spacing: .2em;
            text-transform: uppercase;
        }
        h1 { margin: 0; font-size: clamp(36px, 8vw, 62px); font-weight: 500; }
        p { margin: 18px auto 0; max-width: 460px; font-size: 19px; line-height: 1.6; color: #d9c9b5; }
        a {
            display: inline-flex;
            margin-top: 28px;
            padding: 12px 22px;
            border: 1px solid rgba(232, 194, 128, .45);
            border-radius: 999px;
            color: #fff1d4;
            text-decoration: none;
            font: 700 11px/1 Arial, sans-serif;
            letter-spacing: .14em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <main>
        <p class="code">Error {{ status_code }}</p>
        <h1>{{ heading }}</h1>
        <p>{{ message }}</p>
        <a href="{{ url_for('invitations.home') }}">Return Home</a>
    </main>
</body>
</html>
