<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#17100c">
    <title>Adlin &amp; Prithvi | Your Invitation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Manrope:wght@500;600;700&display=swap"
    >

    <style>
        :root {
            color-scheme: dark;
            --ivory: #fff3db;
            --muted: #d7c6b2;
            --gold: #e2b85e;
            --line: rgba(239, 203, 137, .38);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            overflow-x: hidden;
            padding:
                max(24px, env(safe-area-inset-top))
                20px
                max(24px, env(safe-area-inset-bottom));
            background: #17100c;
            color: var(--ivory);
            font-family: "Cormorant Garamond", Georgia, serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                linear-gradient(
                    115deg,
                    rgba(15, 9, 6, .91),
                    rgba(26, 15, 9, .66)
                ),
                url("{{ asset_url('images/slideshow/DSC06717-1170.webp') }}")
                center / cover no-repeat;
            transform: scale(1.02);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(
                    circle at 50% 18%,
                    rgba(222, 166, 73, .20),
                    transparent 34%
                ),
                linear-gradient(
                    180deg,
                    transparent,
                    rgba(9, 5, 3, .36)
                );
            pointer-events: none;
        }

        .invitation-card {
            width: min(680px, 100%);
            padding:
                clamp(38px, 8vw, 74px)
                clamp(24px, 7vw, 66px);
            text-align: center;
            border: 1px solid var(--line);
            border-radius: 30px;
            background:
                linear-gradient(
                    145deg,
                    rgba(45, 31, 23, .76),
                    rgba(17, 12, 9, .88)
                );
            box-shadow:
                0 30px 90px rgba(0, 0, 0, .48),
                inset 0 1px rgba(255, 255, 255, .08);
            -webkit-backdrop-filter: blur(12px) saturate(115%);
            backdrop-filter: blur(12px) saturate(115%);
        }

        .eyebrow {
            margin: 0 0 18px;
            color: var(--gold);
            font: 700 11px/1.3 "Manrope", sans-serif;
            letter-spacing: .24em;
            text-transform: uppercase;
        }

        .names {
            margin: 0;
            font-family: "Parisienne", cursive;
            font-size: clamp(58px, 13vw, 98px);
            font-weight: 400;
            line-height: .96;
            text-wrap: balance;
        }

        .ornament {
            width: min(190px, 46%);
            height: 1px;
            margin: 28px auto;
            background:
                linear-gradient(
                    90deg,
                    transparent,
                    var(--gold),
                    transparent
                );
        }

        h1 {
            margin: 0;
            font-size: clamp(31px, 6vw, 48px);
            font-weight: 600;
            line-height: 1.08;
            text-wrap: balance;
        }

        .message {
            max-width: 510px;
            margin: 20px auto 0;
            color: var(--muted);
            font-size: clamp(18px, 3.8vw, 22px);
            line-height: 1.55;
            text-wrap: pretty;
        }

        form {
            margin: 30px 0 0;
        }

        .open-button {
            width: min(360px, 100%);
            min-height: 52px;
            padding: 14px 26px;
            border: 1px solid rgba(245, 213, 151, .52);
            border-radius: 999px;
            background:
                linear-gradient(
                    145deg,
                    rgba(116, 74, 35, .92),
                    rgba(66, 39, 20, .95)
                );
            box-shadow:
                0 12px 30px rgba(0, 0, 0, .28),
                inset 0 1px rgba(255, 255, 255, .12);
            color: #fff3d7;
            cursor: pointer;
            font: 700 11px/1 "Manrope", sans-serif;
            letter-spacing: .18em;
            text-transform: uppercase;
            transition:
                transform .2s ease,
                box-shadow .2s ease,
                background .2s ease;
        }

        .open-button:hover,
        .open-button:focus-visible {
            transform: translateY(-2px);
            background:
                linear-gradient(
                    145deg,
                    rgba(139, 92, 43, .96),
                    rgba(76, 44, 21, .98)
                );
            box-shadow:
                0 16px 34px rgba(0, 0, 0, .34),
                inset 0 1px rgba(255, 255, 255, .16);
        }

        .open-button:focus-visible {
            outline: 2px solid #f1c979;
            outline-offset: 4px;
        }

        .privacy-note {
            margin: 22px 0 0;
            color: #d8bd8b;
            font: 600 10px/1.5 "Manrope", sans-serif;
            letter-spacing: .11em;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .invitation-card {
                border-radius: 24px;
                -webkit-backdrop-filter:
                    blur(8px)
                    saturate(110%);
                backdrop-filter:
                    blur(8px)
                    saturate(110%);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .open-button {
                transition: none;
            }
        }
    </style>
</head>

<body>
    {% set guest_name = (
        invitation.display_name
        or invitation.first_name
        or "Dear Guest"
    ) | title %}

    <main class="invitation-card">
        <p class="eyebrow">Private Invitation</p>
        <p class="names">Adlin &amp; Prithvi</p>

        <div class="ornament" aria-hidden="true"></div>

        <h1>Welcome, {{ guest_name }}</h1>

        <p class="message">
            Your private invitation and RSVP await.
            We are so happy to celebrate with you.
        </p>

        <form
            method="post"
            action="{{ url_for(
                'invitations.enter_invitation',
                invite_token=invite_token
            ) }}"
        >
            <input
                type="hidden"
                name="csrf_token"
                value="{{ csrf_token() }}"
            >

            <button class="open-button" type="submit">
                Open Invitation
            </button>
        </form>

        <p class="privacy-note">
            This invitation link is unique to you.
        </p>
    </main>
</body>
</html>
